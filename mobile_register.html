<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新規登録</title>

<style>
    body{
    font-family:sans-serif;
    text-align:center;
    padding:30px;
    }

    input{
    width:90%;
    padding:12px;
    margin:10px;
    font-size:16px;
    }

    button{
    width:95%;
    padding:12px;
    font-size:16px;
    background:#2196F3;
    color:white;
    border:none;
    border-radius:5px;
    }

  .post-form {
    max-width: 500px;
    margin: 0 auto;
    padding: 20px;
    background-color: #fff;
    display: flex;
    flex-direction: column;
  }

  /* アップロードエリア */
  .upload-box {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .upload-box:hover {
    background-color: #f9f9f9;
  }

  .upload-inner {
    color: #666;
    font-size: 18px;
  }
</style>

</head>

<body>

<h2>新規登録</h2>

<form method="POST" action="/mobile/register">

<input type="text" name="user_id" placeholder="ユーザーID" required>
<input type="password" name="password" placeholder="パスワード" required>

<button type="submit">登録</button>

</form>

<a href="/mobile/login">ログインへ戻る</a>

</body>
</html>
