<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン</title>
<style>
  body{
  font-family:sans-serif;
  text-align:center;
  padding:30px;
  }
  
  input{
  width:90%;
  padding:12px;
  margin:10px;
  font-size:16px;
  }
  
  button{
  width:95%;
  padding:12px;
  font-size:16px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:5px;
  }
  
  a{
  display:block;
  margin-top:15px;
  } 
</style>

</head>

<body>

<h2>ログイン</h2>

<form method="POST" action="/mobile/login">
<input type="text" name="user_id" placeholder="ユーザーID" required>
<input type="password" name="password" placeholder="パスワード" required>

<button type="submit">ログイン</button>

</form>

<a href="/mobile/register">新規登録はこちら</a>

</body>
</html>
